# Local development database configuration
# Database configuration
spring.datasource.url=jdbc:postgresql://localhost:5432/opossum
spring.datasource.username=postgres
spring.datasource.password=postgres123

# Security configuration
cors.urls=${CORS_URLS:http://localhost:3000}
cors.enabled=${CORS_ENABLED:true}
csrf.enabled=${CSRF_ENABLED:false}
samesite.cookie.enabled=${SAMESITE_COOKIE_ENABLED:false}

# JWT configuration
jwt.secret=${JWT_SECRET:defaultSecretForDevelopmentOnly}
jwt.expiration=${JWT_EXPIRATION:86400000}

# Disable security for testing
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.security.servlet.SecurityAutoConfiguration
spring.security.enabled=false