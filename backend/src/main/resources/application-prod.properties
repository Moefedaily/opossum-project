# Application configuration
spring.application.name=opossum
application.url=${APP_URL:https://opossum-project.onrender.com}
server.address=0.0.0.0
server.port=8080
server.servlet.context-path=/

# Database Configuration (PostgreSQL)
spring.datasource.url=jdbc:postgresql://${DB_HOST}:${DB_PORT:5432}/${DB_NAME:opossum}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false

# Email Configuration
app.mail.base-url=${APP_MAIL_BASE_URL}
app.mail.from=${MAIL_FROM}
app.mail.from-name=${MAIL_FROM_NAME}

# Security
jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION:86400000}
cors.urls=${CORS_URLS}
cors.enabled=true
csrf.enabled=false

# Logging (production settings)
logging.level.root=INFO
logging.level.com.opossum=INFO
logging.level.org.springframework.security=WARN