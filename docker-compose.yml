version: "3.8"

services:
  # Backend API Service
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: opossum-backend
    ports:
      - "${APP_PORT:-8080}:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=${APP_ENV:-docker}
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=${DB_NAME:-opossum}
      - DB_USERNAME=${DB_USERNAME:-postgres}
      - DB_PASSWORD=${DB_PASSWORD:-postgres123}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - CORS_URLS=${CORS_URLS:-http://localhost:4200,http://localhost:8081}
      - JWT_SECRET=${JWT_SECRET:-rKkTeex9w6EG9q4A4AGkpvgoz2DwP0wM6KhRWAK7fHw=}
      - JWT_EXPIRATION=${JWT_EXPIRATION:-86400000}
      # Email configuration
      - MAIL_USERNAME=${MAIL_USERNAME}
      - MAIL_PASSWORD=${MAIL_PASSWORD}
      - MAIL_FROM=${MAIL_FROM:-noreply@opossum.local}
      - MAIL_FROM_NAME=${MAIL_FROM_NAME:-OPOSSUM Team}
      - MAIL_BASE_URL=${MAIL_BASE_URL:-http://localhost:8080}
      # Cloudinary configuration
      - CLOUDINARY_CLOUD_NAME=${CLOUDINARY_CLOUD_NAME}
      - CLOUDINARY_API_KEY=${CLOUDINARY_API_KEY}
      - CLOUDINARY_API_SECRET=${CLOUDINARY_API_SECRET}
      # File upload
      - MAX_FILE_SIZE=${MAX_FILE_SIZE:-10485760}
      # Messaging
      - MESSAGING_ENCRYPTION_KEY=${MESSAGING_ENCRYPTION_KEY}
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - opossum-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Admin Web Interface
  admin-web:
    build:
      context: ./admin-web
      dockerfile: Dockerfile
    container_name: opossum-admin
    ports:
      - "${ADMIN_PORT:-4200}:80"
    environment:
      - API_URL=${API_URL:-http://backend:8080/api}
    restart: unless-stopped
    depends_on:
      - backend
    networks:
      - opossum-network
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://localhost:80/",
        ]
      interval: 30s
      timeout: 10s
      retries: 3

  # Mobile Development Server (optional)
  mobile:
    build:
      context: ./mobile
      dockerfile: Dockerfile
    container_name: opossum-mobile
    ports:
      - "${MOBILE_PORT:-8081}:8081"
    environment:
      - EXPO_PUBLIC_API_BASE_URL=${EXPO_PUBLIC_API_BASE_URL:-http://localhost:8080}
    restart: unless-stopped
    volumes:
      - ./mobile:/app
      - /app/node_modules
    networks:
      - opossum-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/"]
      interval: 30s
      timeout: 10s
      retries: 3

  # PostgreSQL Database
  postgres:
    image: postgres:14-alpine
    container_name: opossum-postgres
    ports:
      - "${DB_PORT:-5432}:5432"
    environment:
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres123}
      POSTGRES_DB: ${DB_NAME:-opossum}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - opossum-network
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${DB_USERNAME:-postgres} -d ${DB_NAME:-opossum}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  opossum-network:
    driver: bridge
    name: opossum-network

volumes:
  postgres-data:
    name: opossum-postgres-data
